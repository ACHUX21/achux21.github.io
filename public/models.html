<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live2D Model Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; color: #ccc; font-family: monospace; min-height: 100vh; display: flex; }
  .sidebar { width: 300px; background: #111128; border-right: 1px solid #1e1e3a; padding: 16px; overflow-y: auto; height: 100vh; position: fixed; left: 0; top: 0; }
  .sidebar h2 { color: #a855f7; font-size: 1rem; margin-bottom: 12px; }
  .model-btn { display: block; width: 100%; padding: 10px 12px; background: none; border: 1px solid #1e1e3a; border-radius: 6px; color: #aaa; cursor: pointer; text-align: left; font: inherit; font-size: 0.8rem; margin-bottom: 6px; transition: all 0.15s; }
  .model-btn:hover { border-color: #a855f7; color: #fff; background: #1a1a36; }
  .model-btn.active { border-color: #a855f7; background: #1a1030; color: #a855f7; }
  .model-btn .note { color: #555; font-size: 0.65rem; display: block; margin-top: 2px; }
  .main { margin-left: 300px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  .preview-area { width: 360px; height: 440px; background: #0a0a14; border: 1px solid #1e1e3a; border-radius: 12px; position: relative; overflow: hidden; }
  .preview-area canvas { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
  .info-bar { margin-top: 16px; text-align: center; }
  .info-bar .current { color: #a855f7; font-size: 1.1rem; font-weight: bold; }
  .info-bar .note { color: #666; font-size: 0.75rem; margin-top: 4px; }
  .info-bar .url { color: #444; font-size: 0.6rem; margin-top: 4px; word-break: break-all; }
  .keys { margin-top: 12px; color: #444; font-size: 0.7rem; }
  .keys kbd { background: #1a1a2e; padding: 2px 6px; border-radius: 3px; color: #888; border: 1px solid #333; }
</style>
</head>
<body>
<div class="sidebar">
  <h2>Live2D Models</h2>
  <div id="model-list"></div>
</div>
<div class="main">
  <div class="preview-area" id="preview"></div>
  <div class="info-bar">
    <div class="current" id="current-name">Loading...</div>
    <div class="note" id="current-note"></div>
    <div class="url" id="current-url"></div>
  </div>
  <div class="keys">
    <kbd>↑</kbd><kbd>↓</kbd> or <kbd>j</kbd><kbd>k</kbd> to switch &nbsp; <kbd>Enter</kbd> to select
  </div>
</div>

<script src="https://unpkg.com/l2d-widget@0.1.0/dist/index.min.js"></script>
<script>
const MODELS = [
  { name: "Hiyori", url: "https://model.hacxy.cn/Hiyori/model.json", note: "Brown bob, school uniform — CLOSEST TO LAIN" },
  { name: "Shizuku", url: "https://model.hacxy.cn/shizuku/model.json", note: "Dark hair, elegant dress" },
  { name: "Shizuku Pajama", url: "https://model.hacxy.cn/shizuku_pajama/model.json", note: "Casual pajama variant" },
  { name: "Shizuku 48", url: "https://model.hacxy.cn/shizuku_48/model.json", note: "Alt outfit" },
  { name: "Haru", url: "https://model.hacxy.cn/Haru/model.json", note: "Dark hair, formal butler — currently active" },
  { name: "Mao", url: "https://model.hacxy.cn/Mao/model.json", note: "Cat ears, dark casual" },
  { name: "Natori", url: "https://model.hacxy.cn/Natori/model.json", note: "White hair, elegant" },
  { name: "Pio", url: "https://model.hacxy.cn/Pio/model.json", note: "Simple mascot" },
  { name: "Potion Pio", url: "https://model.hacxy.cn/potion-Maker-Pio/model.json", note: "Witch hat Pio" },
  { name: "HK416-1", url: "https://model.hacxy.cn/HK416-1-normal/model.json", note: "Tactical, white hair" },
  { name: "HK416-2", url: "https://model.hacxy.cn/HK416-2-normal/model.json", note: "Alt tactical outfit" },
  { name: "HK416-2 Dmg", url: "https://model.hacxy.cn/HK416-2-destroy/model.json", note: "Damaged variant" },
  { name: "Kar98k", url: "https://model.hacxy.cn/Kar98k-normal/model.json", note: "Rifle girl, dark" },
  { name: "Rem", url: "https://model.hacxy.cn/rem/model.json", note: "Blue hair, maid dress" },
  { name: "Rem v2", url: "https://model.hacxy.cn/rem_2/model.json", note: "Alt maid outfit" },
  { name: "Senko", url: "https://model.hacxy.cn/Senko_Normals/model.json", note: "Fox girl, traditional" },
  { name: "Chino", url: "https://model.hacxy.cn/chino/model.json", note: "Cute, rabbit theme" },
  { name: "Cat Black", url: "https://model.hacxy.cn/cat-black/model.json", note: "Black cat" },
  { name: "Bilibili 22", url: "https://model.hacxy.cn/bilibili-22/model.json", note: "Platform mascot" },
];

let currentIdx = 0;
let widget = null;

function loadModel(idx) {
  currentIdx = idx;
  const model = MODELS[idx];
  
  // Destroy old widget
  const container = document.getElementById('preview');
  container.innerHTML = '';
  if (widget && widget.destroy) widget.destroy();
  
  // Update UI
  document.getElementById('current-name').textContent = model.name;
  document.getElementById('current-note').textContent = model.note;
  document.getElementById('current-url').textContent = model.url;
  
  document.querySelectorAll('.model-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.scrollIntoView?.({ block: 'nearest' });
  });
  
  try {
    widget = L2D_WIDGET.createWidget({
      model: { path: model.url, scale: 1.1 },
      position: 'bottom-left',
      size: { width: 300, height: 380 },
      menus: { items: [] },
      tips: { enable: false },
      transitionDuration: 0,
    });
  } catch(e) {
    container.innerHTML = '<div style="color:#f55;padding:40px;text-align:center">Failed to load model</div>';
  }
}

// Build sidebar
const list = document.getElementById('model-list');
MODELS.forEach((model, i) => {
  const btn = document.createElement('button');
  btn.className = 'model-btn';
  btn.innerHTML = `${model.name}<span class="note">${model.note}</span>`;
  btn.onclick = () => loadModel(i);
  list.appendChild(btn);
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    loadModel(Math.min(currentIdx + 1, MODELS.length - 1));
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    loadModel(Math.max(currentIdx - 1, 0));
  } else if (e.key === 'Enter') {
    const m = MODELS[currentIdx];
    alert(`Tell Kira: "use ${m.name}"\n\nURL: ${m.url}`);
  }
});

// Start with Hiyori
loadModel(0);
</script>
</body>
</html>
